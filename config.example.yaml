# Copy to config.yaml and fill in. config.yaml is gitignored.

event_key: "2026isde1"          # TBA event key
match_key: "2026isde1_qm14"     # TBA match key

apis:
  tba:
    base_url: "https://www.thebluealliance.com/api/v3"
    auth_key: ""                # X-TBA-Auth-Key
  frc_events:
    base_url: "https://frc-api.firstinspires.org/v3.0"
    username: ""
    auth_token: ""
  nexus:
    base_url: "https://frc.nexus/api/v1"
    api_key: ""
  statbotics:
    base_url: "http://localhost:8000"   # self-hosted instance (optional)
  anthropic:
    api_key: ""                 # for VLM disambiguation (milestone 8)
    model: "claude-fable-5"

stream:
  url: ""                       # YouTube live/VOD URL
  mode: "replay"                # replay | live
  detect_fps: 6                 # detection sampling rate; tracker interpolates between

rubric_path: "rubric.json"

# Overlay crop regions are per-broadcast-layout, in fractional (x, y, w, h)
# of the frame. Auto-detection (milestone 4) refines these.
overlay:
  layout: "firstinspires_2026_default"
  ocr_backend: "template"      # template | tesseract | paddleocr
  regions:
    match_timer: [0.44, 0.02, 0.12, 0.06]
    red_score:   [0.30, 0.02, 0.10, 0.06]
    blue_score:  [0.60, 0.02, 0.10, 0.06]
    phase:       [0.44, 0.08, 0.12, 0.04]

# Pixel->field calibration: click >=4 known landmarks on a representative
# frame (tower bases, hub corners, perimeter marks). Field coords in meters,
# origin at the red-alliance right corner, x along the long axis.
# Field size seeded at 16.54 x 8.07 m (standard FRC field; verify against the
# 2026 field drawings). Zone names must exist in rubric.json's zones list.
field:
  size_m: [16.54, 8.07]
  calibration:
    image_points: []            # [[px, py], ...]
    field_points: []            # [[X_m, Y_m], ...]
  zones:
    hub_zone_red:    [[0.0, 2.0], [3.0, 2.0], [3.0, 6.0], [0.0, 6.0]]
    hub_zone_blue:   [[13.5, 2.0], [16.54, 2.0], [16.54, 6.0], [13.5, 6.0]]
    tower_zone_red:  [[0.0, 0.0], [2.5, 0.0], [2.5, 2.0], [0.0, 2.0]]
    tower_zone_blue: [[14.0, 6.0], [16.54, 6.0], [16.54, 8.07], [14.0, 8.07]]
    loading_zone_red:  [[14.0, 0.0], [16.54, 0.0], [16.54, 2.0], [14.0, 2.0]]
    loading_zone_blue: [[0.0, 6.0], [2.5, 6.0], [2.5, 8.07], [0.0, 8.07]]
    neutral_zone:    [[5.5, 0.0], [11.0, 0.0], [11.0, 8.07], [5.5, 8.07]]
  # NOTE: placeholder polygons — measure against the official field drawings
  # before trusting zone-based event attribution.

models:
  detector_weights: "weights/frc_rebuilt_yolo.pt"   # milestone 5
  tracker: "bytetrack"
  bumper_ocr: "paddleocr"       # paddleocr | tesseract

thresholds:
  detection_conf: 0.35
  assignment_min_conf: 0.60     # below this a track stays "unassigned"
  ocr_reassign_margin: 0.25     # OCR must beat current assignment by this much
